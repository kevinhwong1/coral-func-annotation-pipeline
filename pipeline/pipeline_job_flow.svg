<svg width="100%" viewBox="0 0 680 500" role="img">
<title>Coral annotation pipeline job flow</title>
<desc>Three-phase flowchart showing parallel jobs in phase 1, manual DeepTMHMM merge in phase 2, and the final merge job in phase 3</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Phase label backgrounds -->
<rect x="30" y="48" width="620" height="110" rx="6" fill="#1D9E75" fill-opacity="0.06" stroke="#1D9E75" stroke-opacity="0.2" stroke-width="0.5"/>
<rect x="30" y="228" width="620" height="66" rx="6" fill="#BA7517" fill-opacity="0.06" stroke="#BA7517" stroke-opacity="0.2" stroke-width="0.5"/>
<rect x="30" y="328" width="620" height="66" rx="6" fill="#D85A30" fill-opacity="0.06" stroke="#D85A30" stroke-opacity="0.2" stroke-width="0.5"/>

<!-- Phase labels -->
<text class="ts" x="42" y="42" style="font-size:11px;fill:#0F6E56;font-weight:500">Phase 1 — all submitted at once, run in parallel</text>
<text class="ts" x="42" y="222" style="font-size:11px;fill:#854F0B;font-weight:500">Phase 2 — manual step after all DeepTMHMM chunks finish</text>
<text class="ts" x="42" y="322" style="font-size:11px;fill:#993C1D;font-weight:500">Phase 3 — auto-fires when all phase 1 jobs complete</text>

<!-- ── PHASE 1 ROW 1: bigmem ── -->
<g>
  <rect x="42" y="58" width="128" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#085041" x="106" y="79" text-anchor="middle" dominant-baseline="central">01 eggNOG</text>
  <text style="font-size:11px;fill:#0F6E56" x="106" y="97" text-anchor="middle" dominant-baseline="central">bigmem · 12 hr</text>
</g>
<g>
  <rect x="182" y="58" width="128" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#085041" x="246" y="79" text-anchor="middle" dominant-baseline="central">02 OrthoFinder</text>
  <text style="font-size:11px;fill:#0F6E56" x="246" y="97" text-anchor="middle" dominant-baseline="central">bigmem · 120 hr</text>
</g>
<g>
  <rect x="322" y="58" width="128" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#085041" x="386" y="79" text-anchor="middle" dominant-baseline="central">03 InterProScan</text>
  <text style="font-size:11px;fill:#0F6E56" x="386" y="97" text-anchor="middle" dominant-baseline="central">bigmem · 48 hr</text>
</g>
<g>
  <rect x="462" y="58" width="128" height="48" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#085041" x="526" y="79" text-anchor="middle" dominant-baseline="central">04 RBH BLAST</text>
  <text style="font-size:11px;fill:#0F6E56" x="526" y="97" text-anchor="middle" dominant-baseline="central">bigmem · 8 hr</text>
</g>

<!-- ── PHASE 1 ROW 2: general ── -->
<g>
  <rect x="42" y="120" width="128" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#26215C" x="106" y="141" text-anchor="middle" dominant-baseline="central">05 SignalP</text>
  <text style="font-size:11px;fill:#534AB7" x="106" y="159" text-anchor="middle" dominant-baseline="central">general · 20 hr</text>
</g>
<g>
  <rect x="182" y="120" width="128" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#26215C" x="246" y="141" text-anchor="middle" dominant-baseline="central">06 Tier 3 HMM</text>
  <text style="font-size:11px;fill:#534AB7" x="246" y="159" text-anchor="middle" dominant-baseline="central">general · 6 hr</text>
</g>
<g>
  <rect x="322" y="120" width="128" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#26215C" x="386" y="141" text-anchor="middle" dominant-baseline="central">07 Tier 4 BLAST</text>
  <text style="font-size:11px;fill:#534AB7" x="386" y="159" text-anchor="middle" dominant-baseline="central">general · 1 hr</text>
</g>
<g>
  <rect x="462" y="120" width="128" height="48" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#26215C" x="526" y="137" text-anchor="middle" dominant-baseline="central">05b DeepTMHMM</text>
  <text style="font-size:11px;fill:#534AB7" x="526" y="153" text-anchor="middle" dominant-baseline="central">general · 12 hr/chunk</text>
  <text style="font-size:10px;fill:#7F77DD" x="526" y="165" text-anchor="middle" dominant-baseline="central">after SignalP</text>
</g>

<!-- SignalP → DeepTMHMM dependency arrow -->
<path d="M170 144 L462 144" fill="none" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow)" stroke-opacity="0.5"/>

<!-- ── PHASE 2 ── -->
<g>
  <rect x="175" y="238" width="330" height="48" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#412402" x="340" y="257" text-anchor="middle" dominant-baseline="central">Merge DeepTMHMM chunks</text>
  <text style="font-size:11px;fill:#854F0B" x="340" y="275" text-anchor="middle" dominant-baseline="central">check chunks complete · cat GFF3 files · bsub job 08</text>
</g>

<!-- DeepTMHMM → Phase 2 -->
<path d="M526 168 L526 210 L340 210 L340 238" fill="none" stroke="#BA7517" stroke-width="1" stroke-opacity="0.6" marker-end="url(#arrow)"/>
<!-- Convergence note -->
<text style="font-size:10px;fill:#888780" x="340" y="206" text-anchor="middle">all phase 1 jobs must be complete before submitting merge</text>

<!-- ── PHASE 3 ── -->
<g>
  <rect x="210" y="338" width="260" height="48" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#4A1B0C" x="340" y="357" text-anchor="middle" dominant-baseline="central">08 merge_annotate.py</text>
  <text style="font-size:11px;fill:#993C1D" x="340" y="375" text-anchor="middle" dominant-baseline="central">general · 2 hr · auto-fires via done(JID)</text>
</g>
<path d="M340 286 L340 338" fill="none" stroke="#993C1D" stroke-width="1" stroke-opacity="0.6" marker-end="url(#arrow)"/>

<!-- ── OUTPUT ── -->
<g>
  <rect x="210" y="418" width="260" height="48" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text style="font-size:13px;font-weight:500;fill:#2C2C2A" x="340" y="437" text-anchor="middle" dominant-baseline="central">Master annotation table</text>
  <text style="font-size:11px;fill:#5F5E5A" x="340" y="455" text-anchor="middle" dominant-baseline="central">TSV + gene lists per species</text>
</g>
<path d="M340 386 L340 418" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-opacity="0.6" marker-end="url(#arrow)"/>

<!-- LEGEND -->
<rect x="42" y="480" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text style="font-size:11px;fill:#0F6E56" x="58" y="489">bigmem queue</text>
<rect x="155" y="480" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:11px;fill:#534AB7" x="171" y="489">general queue</text>
<rect x="268" y="480" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text style="font-size:11px;fill:#854F0B" x="284" y="489">manual step</text>
<rect x="365" y="480" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text style="font-size:11px;fill:#993C1D" x="381" y="489">final merge</text>
</svg>